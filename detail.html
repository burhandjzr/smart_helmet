<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Helmet Dashboard - Detail View</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">SMART HELMET</div>
    <div class="nav-links">
        <a href="index.html">Fleet Dashboard</a>
        <a href="logs.html">Event Logs</a>
    </div>
</nav>

<div class="container">
    <header>
        <h1 id="detail_title">HELMET DASHBOARD</h1>
        <p>Industrial IoT Monitoring System Device View</p>
    </header>

    <div class="grid">
        <div class="card"><h3>Device ID</h3><p id="device_id">-</p></div>
        <div class="card"><h3>Eye Status</h3><p id="eye_status">-</p></div>
        <div class="card"><h3>Drowsiness</h3><p id="drowsiness_status">-</p></div>
        <div class="card"><h3>Accident</h3><p id="accident_status">-</p></div>
        <div class="card"><h3>Helmet Activity</h3><p id="helmet_activity_status">-</p></div>
        <div class="card">
            <h3>System Control</h3>
            <label class="switch">
                <input type="checkbox" id="system_toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="card gyro">
            <h3>Gyroscope Data</h3>
            <p>X : <span id="gyro_x">-</span></p>
            <p>Y : <span id="gyro_y">-</span></p>
            <p>Z : <span id="gyro_z">-</span></p>
        </div>
        <div class="card"><h3>Last Update</h3><p id="updated_at">-</p></div>
    </div>

    <div class="map-card">
        <h3>Worker Location</h3>
        <div id="map"></div>
    </div>

    <div class="log-table-card" style="margin-top:30px;">
        <h2 class="section-title">Realtime Event Log</h2>
        <div id="event_log"></div>
    </div>
</div>

<!-- app.js loaded first: provides client, BASE_LAT/LNG, formatDateTime, setStatusUI -->
<script src="app.js"></script>
<!-- helm.js reads ?id= from URL and runs the correct live/dummy logic -->
<script src="helm.js"></script>
</body>
</html>
