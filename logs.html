<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Logs - Multi Helmet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        select {
            background: #111827; color: white; border: 1px solid #3b82f6;
            padding: 8px 15px; border-radius: 10px; font-size: 14px; cursor: pointer; outline: none;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">SMART HELMET</div>
    <div class="nav-links">
        <a href="index.html">Fleet Dashboard</a>
        <a href="logs.html" class="active">Event Logs</a>
    </div>
</nav>

<div class="container">
    <header>
        <h1>EVENT LOGS</h1>
        <p>Industrial Safety Event History Audit</p>
    </header>

    <div class="log-table-card">
        <div class="tracking-header">
            <h2 class="section-title">Event History</h2>
            <div style="display:flex;align-items:center;gap:12px;">
                <label for="helmet_selector" style="color:#94a3b8;font-size:14px;">Select Device:</label>
                <select id="helmet_selector" onchange="switchDeviceLog()">
                    <option value="HELM-01">HELM-01 (Live Database)</option>
                    <option value="HELM-02">HELM-02 (Dummy Worker)</option>
                    <option value="HELM-03">HELM-03 (Dummy Worker)</option>
                </select>
                <div id="tracking_info">Loading...</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Device ID</th>
                    <th>Event Log Message</th>
                    <th>Severity Status</th>
                </tr>
            </thead>
            <tbody id="log_table"></tbody>
        </table>
    </div>

    <div class="map-card">
        <h3 id="map_title">Worker Tracking Route</h3>
        <div id="map"></div>
    </div>
</div>

<!-- app.js provides client, BASE_LAT/LNG, formatDateTime -->
<script src="app.js"></script>
<script src="logs.js"></script>
</body>
</html>
