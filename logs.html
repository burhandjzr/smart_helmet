<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>
        Event Logs
    </title>

    <!-- SUPABASE -->
    <script src=
"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <!-- LEAFLET -->
    <link rel="stylesheet"
          href=
"https://unpkg.com/leaflet/dist/leaflet.css"/>

    <script src=
"https://unpkg.com/leaflet/dist/leaflet.js">
    </script>

    <!-- CSS -->
    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- ========================= -->
<!-- NAVBAR -->
<!-- ========================= -->

<nav class="navbar">

    <div class="logo">

        SMART HELMET

    </div>

    <div class="nav-links">

        <a href="index.html">

            Dashboard

        </a>

        <a href="logs.html"
           class="active">

            Event Logs

        </a>

    </div>

</nav>

<!-- ========================= -->
<!-- CONTENT -->
<!-- ========================= -->

<div class="container">

    <header>

        <h1>
            EVENT LOGS
        </h1>

        <p>
            Industrial Safety Event History
        </p>

    </header>

    <!-- ========================= -->
    <!-- EVENT TABLE -->
    <!-- ========================= -->

    <div class="log-table-card">

        <div class="tracking-header">

            <h2 class="section-title">

                Event History

            </h2>

            <div id="tracking_info">

                Loading...
            </div>

        </div>

        <table>

            <thead>

                <tr>

                    <th>Time</th>

                    <th>Device</th>

                    <th>Event</th>

                    <th>Severity</th>

                </tr>

            </thead>

            <tbody id="log_table">

            </tbody>

        </table>

    </div>

    <!-- ========================= -->
    <!-- GPS TRACKING -->
    <!-- ========================= -->

    <div class="map-card">

        <div class="tracking-header">

            <h2 class="section-title">

                GPS Tracking Route

            </h2>

            <div id="route_summary">

                Calculating route...
            </div>

        </div>

        <div id="tracking_map"></div>

    </div>

</div>

<script>

// =========================
// SUPABASE
// =========================

const SUPABASE_URL =
"https://vfqbpjabzghzjuhmwxtj.supabase.co";

const SUPABASE_KEY =
"sb_publishable_QKA_4y0d6eZZo561MQsUnA_kGmCpgkh";

const client =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// =========================
// OPENROUTESERVICE
// =========================

const API_KEY =
"eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjAwZGRkYjZlYTkyNzQzMDk5ZGQ4ZTA0MzVlNGI2NjdlIiwiaCI6Im11cm11cjY0In0=";

// =========================
// FORMAT DATETIME
// =========================

function formatDateTime(timestamp){

    const date =
    new Date(timestamp);

    return date.toLocaleString(
        "id-ID",
        {

            day:"2-digit",

            month:"short",

            year:"numeric",

            hour:"2-digit",

            minute:"2-digit",

            second:"2-digit"
        }
    );
}

// =========================
// MAP
// =========================

const map =
L.map('tracking_map')
.setView(
    [-6.200000,106.816000],
    14
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'OpenStreetMap'
}).addTo(map);

// =========================
// CUSTOM ICON
// =========================

const startIcon =
L.icon({

    iconUrl:
    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',

    shadowUrl:
    'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',

    iconSize:[25,41],

    iconAnchor:[12,41]
});

const endIcon =
L.icon({

    iconUrl:
    'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

    shadowUrl:
    'https://unpkg.com/leaflet@1.7.1/dist/images/marker-shadow.png',

    iconSize:[25,41],

    iconAnchor:[12,41]
});

// =========================
// GLOBAL
// =========================

let polyline = null;
let startMarker = null;
let endMarker = null;

// =========================
// LOAD LOGS
// =========================

async function loadLogs(){

    try{

        // =====================
        // GET 20 LATEST DATA
        // =====================

        const { data, error } =

        await client

        .from("sensor_realtime")

        .select("*")

        .order(
            "updated_at",
            { ascending:false }
        )

        .limit(20);

        if(error){

            console.log(error);

            return;
        }

        if(!data || data.length === 0){

            console.log(
                "No data"
            );

            return;
        }

        // =====================
        // SORT OLDEST -> NEWEST
        // FOR GPS TRACKING
        // =====================

        const sortedData =
        data.reverse();

        // =====================
        // TABLE
        // =====================

        const table =
        document.getElementById(
            "log_table"
        );

        table.innerHTML = "";

        // TABLE = NEWEST FIRST
        data.forEach(sensor => {

            let event =
            "🟢 NORMAL";

            let severity =
            "safe";

            if(sensor.drowsiness_status){

                event =
                "🟡 DROWSINESS";

                severity =
                "warning";
            }

            if(sensor.accident_status){

                event =
                "🔴 ACCIDENT";

                severity =
                "danger";
            }

            if(
                sensor.helmet_activity_status
                === "inactive"
            ){

                event =
                "🔴 HELMET INACTIVE";

                severity =
                "danger";
            }

            if(!sensor.system_status){

                event =
                "🟡 SYSTEM OFF";

                severity =
                "warning";
            }

            const row =
            document.createElement("tr");

            row.innerHTML = `

                <td>
                    ${formatDateTime(sensor.updated_at)}
                </td>

                <td>
                    ${sensor.device_id}
                </td>

                <td>
                    ${event}
                </td>

                <td>

                    <span class="${severity}">
                        ${severity.toUpperCase()}
                    </span>

                </td>
            `;

            table.appendChild(row);
        });

        // =====================
        // GPS COORDINATES
        // =====================

        const coordinates =
        sortedData.map(item => [

            Number(item.longitude),
            Number(item.latitude)

        ]);

        // =====================
        // REMOVE OLD LAYER
        // =====================

        if(polyline){

            map.removeLayer(polyline);
        }

        if(startMarker){

            map.removeLayer(startMarker);
        }

        if(endMarker){

            map.removeLayer(endMarker);
        }

        // =====================
        // ROUTE REQUEST
        // =====================

        let routeCoords = [];

        try{

            const response =
            await fetch(

                "https://api.openrouteservice.org/v2/directions/driving-car/geojson",

                {

                    method:"POST",

                    headers:{

                        "Authorization":API_KEY,

                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        coordinates:coordinates
                    })
                }
            );

            const routeData =
            await response.json();

            console.log(routeData);

            // SUCCESS
            if(
                routeData.features &&
                routeData.features.length > 0
            ){

                routeCoords =

                routeData.features[0]
                .geometry.coordinates

                .map(coord => [

                    coord[1],
                    coord[0]

                ]);

                // =====================
                // ROUTE SUMMARY
                // =====================

                const summary =

                routeData.features[0]
                .properties.summary;

                const distanceKm =

                (
                    summary.distance / 1000
                ).toFixed(2);

                const durationMin =

                (
                    summary.duration / 60
                ).toFixed(1);

                document
                .getElementById(
                    "route_summary"
                )

                .innerHTML = `

                    Distance :
                    <b>${distanceKm} km</b>

                    &nbsp;&nbsp;|&nbsp;&nbsp;

                    Duration :
                    <b>${durationMin} min</b>
                `;

            }else{

                throw new Error(
                    "Route invalid"
                );
            }

        }catch(routeError){

            console.log(
                "Fallback polyline"
            );

            // FALLBACK
            routeCoords =
            coordinates.map(c => [

                c[1],
                c[0]
            ]);

            document
            .getElementById(
                "route_summary"
            )

            .innerHTML = `

                GPS Polyline Mode
            `;
        }

        // =====================
        // DRAW ROUTE
        // =====================

        polyline =
        L.polyline(

            routeCoords,

            {

                color:'#3b82f6',

                weight:6,

                opacity:0.9
            }

        ).addTo(map);

        // =====================
        // START MARKER
        // =====================

        startMarker =
        L.marker(

            routeCoords[0],

            {
                icon:startIcon
            }

        )

        .addTo(map)

        .bindPopup(`

            <b>
                START POINT
            </b>

            <br><br>

            ${formatDateTime(
                sortedData[0].updated_at
            )}

        `);

        // =====================
        // END MARKER
        // =====================

        const lastData =
        sortedData[
            sortedData.length - 1
        ];

        endMarker =
        L.marker(

            routeCoords[
                routeCoords.length - 1
            ],

            {
                icon:endIcon
            }

        )

        .addTo(map)

        .bindPopup(`

            <b>
                LAST POSITION
            </b>

            <br><br>

            Device :
            ${lastData.device_id}

            <br><br>

            Time :
            ${formatDateTime(
                lastData.updated_at
            )}

        `)

        .openPopup();

        // =====================
        // FIT ROUTE
        // =====================

        map.fitBounds(
            polyline.getBounds()
        );

        // =====================
        // TRACKING INFO
        // =====================

        document
        .getElementById(
            "tracking_info"
        )

        .innerHTML = `

            Tracking Points :
            <b>${coordinates.length}</b>

            &nbsp;&nbsp;|&nbsp;&nbsp;

            Latest Update :
            <b>
                ${formatDateTime(
                    data[0].updated_at
                )}
            </b>
        `;

    }catch(err){

        console.log(err);
    }
}

// =========================
// START
// =========================

loadLogs();

// AUTO REFRESH
setInterval(
    loadLogs,
    15000
);

</script>

</body>
</html>
